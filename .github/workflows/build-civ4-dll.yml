name: Build Civ4 K-Mod DLL

on:
  workflow_dispatch:
  push:
    paths:
      - "CvGameCoreDLL/**"
      - ".github/workflows/build-civ4-dll.yml"
  pull_request:
    paths:
      - "CvGameCoreDLL/**"
      - ".github/workflows/build-civ4-dll.yml"

concurrency:
  group: build-civ4-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dll:
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      VC2003_ROOT: C:\Program Files (x86)\Microsoft Visual C++ Toolkit 2003
      BUILD_DEPS_URL: https://github.com/magnublo/Civ4-K-Mod/releases/download/build-deps/v1
      SDK_DEPS_REPO: FinalFrontierPlus/CvGameCoreDLL
      SDK_DEPS_REF: fc130b5ebaf13f9b989004332a4bf0ddd50cd172

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache VC++ Toolkit 2003
        id: cache-vc2003
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft Visual C++ Toolkit 2003
          key: ${{ runner.os }}-vc2003-toolkit-v1

      - name: Cache Civ4 SDK dependency folders
        id: cache-sdk-deps
        uses: actions/cache@v4
        with:
          path: |
            CvGameCoreDLL/Boost-1.32.0
            CvGameCoreDLL/Python24
          key: ${{ runner.os }}-civ4-sdk-deps-${{ env.SDK_DEPS_REF }}

      - name: Install VC++ Toolkit 2003 and required CRT libs
        env:
          # Set to 'true' for verbose diagnostic output from this step.
          VC2003_DEBUG: 'true'
        shell: pwsh
        run: |
          $vcRoot = $env:VC2003_ROOT
          $clPath = Join-Path $vcRoot "bin\cl.exe"
          $debug  = $env:VC2003_DEBUG -eq 'true'

          function Write-Debug($msg) { if ($debug) { Write-Host "[DEBUG] $msg" } }

          if (-not (Test-Path $clPath)) {
            # --- Download installer ---
            Write-Host "Installing VC++ Toolkit 2003..."
            $installer = Join-Path $env:RUNNER_TEMP "VCToolkitSetup.exe"
            Invoke-WebRequest "$env:BUILD_DEPS_URL/VCToolkitSetup.exe" -OutFile $installer -UseBasicParsing

            $fileSize = (Get-Item $installer).Length
            Write-Host "Downloaded installer size: $fileSize bytes"
            if ($fileSize -lt 1MB) {
              throw "Downloaded installer is too small ($fileSize bytes)."
            }

            # The bootstrapper returns 1645 on Windows Server 2022 due to an
            # internal OS version check, *before* it ever calls msiexec. None of
            # the following work: registry policy relaxation, /qn, /qb, etc.
            #
            # Strategy: use InstallShield extraction flags to get the embedded
            # MSI out of the bootstrapper, then run msiexec /a (admin extract)
            # to get the actual toolkit files without running any install logic.

            $isExtractDir = Join-Path $env:RUNNER_TEMP "vc2003_isextract"
            New-Item -Path $isExtractDir -ItemType Directory -Force | Out-Null

            # --- Attempt 1: /b flag (InstallShield temp extraction path) ---
            # The /b flag tells the bootstrapper where to extract its temp files
            # (including the MSI). Even if the install itself fails, the MSI may
            # be left in this directory.
            Write-Host "Attempt 1: Running bootstrapper with /b flag to capture MSI..."
            $proc = Start-Process -FilePath $installer `
              -ArgumentList "/s /b`"$isExtractDir`" /v`"/qn`"" `
              -Wait -PassThru
            Write-Host "Bootstrapper exit code: $($proc.ExitCode)"

            # Also check without /s (the bootstrapper might skip extraction in silent mode).
            if (-not (Get-ChildItem $isExtractDir -Filter "*.msi" -ErrorAction SilentlyContinue)) {
              Write-Host "No MSI found with /s. Trying without /s..."
              $proc2 = Start-Process -FilePath $installer `
                -ArgumentList "/b`"$isExtractDir`" /v`"/qn`"" `
                -Wait -PassThru
              Write-Host "Bootstrapper exit code (no /s): $($proc2.ExitCode)"
            }

            if ($debug -and (Test-Path $isExtractDir)) {
              Write-Debug "Contents of /b extract dir:"
              Get-ChildItem $isExtractDir -Recurse | ForEach-Object {
                Write-Debug "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
              }
            }

            # Search for MSI in the extraction dir and common temp paths.
            $msiFile = $null
            $searchPaths = @($isExtractDir, $env:TEMP, $env:RUNNER_TEMP, "C:\Windows\Temp")
            foreach ($root in $searchPaths) {
              $found = Get-ChildItem $root -Filter "*.msi" -Recurse -Depth 4 -ErrorAction SilentlyContinue |
                Where-Object { $_.Length -gt 1MB } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 1
              if ($found) {
                $msiFile = $found
                Write-Host "Found MSI: $($found.FullName) ($($found.Length) bytes)"
                break
              }
            }

            # --- Attempt 2: /extract_all flag (InstallShield PFTW extraction) ---
            if (-not $msiFile) {
              Write-Host "Attempt 2: Trying /extract_all flag..."
              $extractAllDir = Join-Path $env:RUNNER_TEMP "vc2003_extractall"
              New-Item -Path $extractAllDir -ItemType Directory -Force | Out-Null

              # Several variations of this flag exist across InstallShield versions.
              foreach ($flag in @(
                "/extract_all:`"$extractAllDir`"",
                "/extract_all `"$extractAllDir`"",
                "/a /s /v`"/qn TARGETDIR=\`"$extractAllDir\`"`""
              )) {
                Write-Host "  Trying: VCToolkitSetup.exe $flag"
                $proc = Start-Process -FilePath $installer -ArgumentList $flag -Wait -PassThru
                Write-Host "  Exit code: $($proc.ExitCode)"

                $found = Get-ChildItem $extractAllDir -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue |
                  Where-Object { $_.Length -gt 1MB } |
                  Sort-Object Length -Descending |
                  Select-Object -First 1
                if ($found) {
                  $msiFile = $found
                  Write-Host "Found MSI: $($found.FullName) ($($found.Length) bytes)"
                  break
                }
              }

              if ($debug -and (Test-Path $extractAllDir)) {
                Write-Debug "Contents of extract_all dir:"
                Get-ChildItem $extractAllDir -Recurse | ForEach-Object {
                  Write-Debug "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
                }
              }
            }

            # --- Attempt 3: Monitor filesystem during install ---
            if (-not $msiFile) {
              Write-Host "Attempt 3: Running installer while monitoring temp for MSI..."

              # Start a background job to watch for MSI files in TEMP.
              $watchJob = Start-Job -ScriptBlock {
                param($tempDir, $extractDir)
                $found = @()
                $deadline = (Get-Date).AddSeconds(120)
                while ((Get-Date) -lt $deadline) {
                  foreach ($root in @($tempDir, $extractDir, "C:\Windows\Temp", $env:TEMP)) {
                    $msis = Get-ChildItem $root -Filter "*.msi" -Recurse -Depth 4 -ErrorAction SilentlyContinue |
                      Where-Object { $_.Length -gt 1MB }
                    foreach ($m in $msis) {
                      $dest = Join-Path $extractDir $m.Name
                      if (-not (Test-Path $dest)) {
                        Copy-Item $m.FullName $dest -Force -ErrorAction SilentlyContinue
                        $found += $dest
                      }
                    }
                  }
                  Start-Sleep -Seconds 2
                }
                return $found
              } -ArgumentList $env:TEMP, $isExtractDir

              # Run installer while the watcher is active.
              $proc = Start-Process -FilePath $installer `
                -ArgumentList "/s /v`"/qn`"" `
                -Wait -PassThru
              Write-Host "Installer exit code: $($proc.ExitCode)"

              # Give the watcher a few more seconds.
              Start-Sleep -Seconds 10
              Stop-Job $watchJob -ErrorAction SilentlyContinue
              $captured = Receive-Job $watchJob -ErrorAction SilentlyContinue
              Remove-Job $watchJob -ErrorAction SilentlyContinue

              if ($captured) {
                Write-Host "Filesystem watcher captured MSI files:"
                foreach ($c in $captured) { Write-Host "  $c" }
                $msiFile = Get-ChildItem $captured[0] -ErrorAction SilentlyContinue
              }

              # Also scan again after the installer exits.
              if (-not $msiFile) {
                foreach ($root in @($env:TEMP, $env:RUNNER_TEMP, $isExtractDir, "C:\Windows\Temp")) {
                  $found = Get-ChildItem $root -Filter "*.msi" -Recurse -Depth 4 -ErrorAction SilentlyContinue |
                    Where-Object { $_.Length -gt 1MB } |
                    Sort-Object LastWriteTime -Descending |
                    Select-Object -First 1
                  if ($found) {
                    $msiFile = $found
                    Write-Host "Found MSI post-install: $($found.FullName) ($($found.Length) bytes)"
                    break
                  }
                }
              }
            }

            # --- Extract toolkit files from MSI ---
            if ($msiFile) {
              Write-Host "Extracting toolkit from MSI: $($msiFile.FullName)..."
              $msiExtract = Join-Path $env:RUNNER_TEMP "vc2003_msi_extract"
              $msiLog = Join-Path $env:RUNNER_TEMP "vc2003_msiexec.log"
              $msiProc = Start-Process msiexec `
                -ArgumentList "/a `"$($msiFile.FullName)`" /qn TARGETDIR=`"$msiExtract`" /l*v `"$msiLog`"" `
                -Wait -PassThru
              Write-Host "msiexec /a exit code: $($msiProc.ExitCode)"

              if ($debug -and (Test-Path $msiLog)) {
                Write-Debug "msiexec log (last 40 lines):"
                Get-Content $msiLog -Tail 40 | ForEach-Object { Write-Debug "  $_" }
              }

              $extractedCl = Get-ChildItem $msiExtract -Filter "cl.exe" -Recurse -ErrorAction SilentlyContinue |
                Select-Object -First 1
              if ($extractedCl) {
                $binDir = $extractedCl.Directory
                $toolkitRoot = $binDir.Parent
                if ((Test-Path "$($toolkitRoot.FullName)\bin") -and (Test-Path "$($toolkitRoot.FullName)\include")) {
                  Write-Host "Copying toolkit from $($toolkitRoot.FullName) to $vcRoot"
                  Copy-Item $toolkitRoot.FullName $vcRoot -Recurse -Force
                } else {
                  Write-Host "Toolkit structure unclear. Copying full extraction to $vcRoot"
                  New-Item -Path $vcRoot -ItemType Directory -Force | Out-Null
                  Copy-Item "$msiExtract\*" $vcRoot -Recurse -Force
                }
              } else {
                Write-Host "cl.exe not found in MSI extraction."
                if (Test-Path $msiExtract) {
                  Write-Host "MSI extraction contents:"
                  Get-ChildItem $msiExtract -Recurse | ForEach-Object {
                    Write-Host "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
                  }
                }
              }
            } else {
              Write-Host "::error::No MSI found after all extraction attempts."
              Write-Host "Listing large files across temp directories:"
              foreach ($root in @($env:TEMP, $env:RUNNER_TEMP, "C:\Windows\Temp")) {
                Get-ChildItem $root -Recurse -Depth 3 -ErrorAction SilentlyContinue |
                  Where-Object { $_.Length -gt 100KB } |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 10 |
                  ForEach-Object { Write-Host "  $($_.Length.ToString().PadLeft(12))  $($_.LastWriteTime)  $($_.FullName)" }
              }
            }
          }

          if (-not (Test-Path $clPath)) {
            Write-Host "::error::cl.exe not found after all installation attempts."
            if (Test-Path $vcRoot) {
              Write-Host "Install directory contents:"
              Get-ChildItem $vcRoot -Recurse -Name | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "Install directory does NOT exist: $vcRoot"
            }
            throw "VC++ Toolkit 2003 was not provisioned correctly. Expected compiler at: $clPath"
          }

          Write-Host "VC++ Toolkit 2003 compiler found at: $clPath"

          $libDir = Join-Path $vcRoot "lib"
          New-Item -Path $libDir -ItemType Directory -Force | Out-Null

          foreach ($lib in @("msvcrt.lib", "msvcrtd.lib", "msvcprt.lib")) {
            $target = Join-Path $libDir $lib
            if (-not (Test-Path $target)) {
              Invoke-WebRequest "$env:BUILD_DEPS_URL/$lib" -OutFile $target -UseBasicParsing
            }
          }

      - name: Fetch missing Boost 1.32 and Python24 folders
        if: steps.cache-sdk-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $tmpRepo = Join-Path $env:RUNNER_TEMP "civ4-sdk-deps"
          if (Test-Path $tmpRepo) {
            Remove-Item -Recurse -Force $tmpRepo
          }

          git clone --depth 1 --branch master "https://github.com/$env:SDK_DEPS_REPO.git" $tmpRepo

          Copy-Item "$tmpRepo\Boost-1.32.0" "CvGameCoreDLL\Boost-1.32.0" -Recurse -Force
          Copy-Item "$tmpRepo\Python24" "CvGameCoreDLL\Python24" -Recurse -Force

      - name: Validate dependency folders
        shell: pwsh
        run: |
          $requiredPaths = @(
            "CvGameCoreDLL\Boost-1.32.0\include\boost\python.hpp",
            "CvGameCoreDLL\Boost-1.32.0\libs\boost_python-vc71-mt-1_32.lib",
            "CvGameCoreDLL\Python24\include\Python.h",
            "CvGameCoreDLL\Python24\libs\python24.lib"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              throw "Missing required SDK dependency: $path"
            }
          }

      - name: Resolve a compatible Windows SDK path
        shell: pwsh
        run: |
          function Test-PsdkRoot([string]$root) {
            if ([string]::IsNullOrWhiteSpace($root)) {
              return $false
            }

            $rc = Join-Path $root "Bin\rc.exe"
            $include = Join-Path $root "Include\windows.h"
            $lib = Join-Path $root "Lib\kernel32.lib"

            return (Test-Path $rc) -and (Test-Path $include) -and (Test-Path $lib)
          }

          $candidates = @(
            "C:\Program Files\Microsoft SDKs\Windows\v7.1",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.1",
            "C:\Program Files\Microsoft SDKs\Windows\v7.0A",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.0A"
          )

          $psdkPath = $null
          foreach ($candidate in $candidates) {
            if (Test-PsdkRoot $candidate) {
              $psdkPath = $candidate
              break
            }
          }

          if (-not $psdkPath) {
            throw "No compatible Windows SDK was found. Expected one of: $($candidates -join ', ')"
          }

          "TOOLKIT_PATH=$env:VC2003_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PSDK_PATH=$psdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Using toolkit: $env:VC2003_ROOT"
          Write-Host "Using Windows SDK: $psdkPath"

      - name: Build Release DLL
        working-directory: CvGameCoreDLL
        shell: cmd
        run: |
          nmake TOOLKIT="%TOOLKIT_PATH%" PSDK="%PSDK_PATH%" Release

      - name: Stage built DLL into Assets
        shell: pwsh
        run: |
          Copy-Item "CvGameCoreDLL\Release\CvGameCoreDLL.dll" "Assets\CvGameCoreDLL.dll" -Force

      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CvGameCoreDLL-Release
          if-no-files-found: error
          path: |
            CvGameCoreDLL/Release/CvGameCoreDLL.dll
            CvGameCoreDLL/Release/CvGameCoreDLL.pdb
            Assets/CvGameCoreDLL.dll