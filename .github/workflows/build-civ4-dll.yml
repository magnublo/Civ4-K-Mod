name: Build Civ4 K-Mod DLL

on:
  workflow_dispatch:
  push:
    paths:
      - "CvGameCoreDLL/**"
      - ".github/workflows/build-civ4-dll.yml"
  pull_request:
    paths:
      - "CvGameCoreDLL/**"
      - ".github/workflows/build-civ4-dll.yml"

concurrency:
  group: build-civ4-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dll:
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      VC2003_ROOT: C:\Program Files (x86)\Microsoft Visual C++ Toolkit 2003
      BUILD_DEPS_URL: https://github.com/magnublo/Civ4-K-Mod/releases/download/build-deps/v1
      SDK_DEPS_REPO: FinalFrontierPlus/CvGameCoreDLL
      SDK_DEPS_REF: fc130b5ebaf13f9b989004332a4bf0ddd50cd172

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache VC++ Toolkit 2003
        id: cache-vc2003
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft Visual C++ Toolkit 2003
          key: ${{ runner.os }}-vc2003-toolkit-v1

      - name: Cache Civ4 SDK dependency folders
        id: cache-sdk-deps
        uses: actions/cache@v4
        with:
          path: |
            CvGameCoreDLL/Boost-1.32.0
            CvGameCoreDLL/Python24
          key: ${{ runner.os }}-civ4-sdk-deps-${{ env.SDK_DEPS_REF }}

      - name: Install VC++ Toolkit 2003 and required CRT libs
        env:
          # Set to 'true' for verbose diagnostic output from this step.
          VC2003_DEBUG: 'true'
        shell: pwsh
        run: |
          $vcRoot = $env:VC2003_ROOT
          $clPath = Join-Path $vcRoot "bin\cl.exe"
          $debug  = $env:VC2003_DEBUG -eq 'true'

          function Write-Debug($msg) { if ($debug) { Write-Host "[DEBUG] $msg" } }

          if (-not (Test-Path $clPath)) {
            # --- Download installer ---
            Write-Host "Installing VC++ Toolkit 2003..."
            $installer = Join-Path $env:RUNNER_TEMP "VCToolkitSetup.exe"
            Invoke-WebRequest "$env:BUILD_DEPS_URL/VCToolkitSetup.exe" -OutFile $installer -UseBasicParsing

            $fileSize = (Get-Item $installer).Length
            Write-Host "Downloaded installer size: $fileSize bytes"
            if ($fileSize -lt 1MB) {
              throw "Downloaded installer is too small ($fileSize bytes). The host may be returning an error page instead of the binary."
            }

            # --- Relax Windows Installer policy ---
            # Exit code 1645 (ERROR_INSTALL_PACKAGE_REJECTED) on GitHub-hosted
            # runners is caused by a Windows Installer policy that blocks old
            # MSI packages. Disable it before running the installer.
            Write-Host "Configuring Windows Installer policy..."
            foreach ($regPath in @(
              "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer",
              "HKCU:\SOFTWARE\Policies\Microsoft\Windows\Installer"
            )) {
              if (-not (Test-Path $regPath)) {
                New-Item -Path $regPath -Force | Out-Null
              }
              # DisableMSI: 0 = Never disabled
              Set-ItemProperty -Path $regPath -Name "DisableMSI" -Value 0 -Type DWord -Force
              # AlwaysInstallElevated: allow elevated installs
              Set-ItemProperty -Path $regPath -Name "AlwaysInstallElevated" -Value 1 -Type DWord -Force
              Remove-ItemProperty -Path $regPath -Name "DisableUserInstalls" -ErrorAction SilentlyContinue
            }

            # Dump current policy state for diagnostics.
            if ($debug) {
              foreach ($regPath in @(
                "HKLM:\SOFTWARE\Policies\Microsoft\Windows\Installer",
                "HKCU:\SOFTWARE\Policies\Microsoft\Windows\Installer"
              )) {
                if (Test-Path $regPath) {
                  Write-Debug "Registry: $regPath"
                  Get-ItemProperty $regPath | Format-List | Out-String | ForEach-Object { Write-Debug $_ }
                }
              }
            }

            # Ensure Windows Installer service is running.
            Set-Service -Name msiserver -StartupType Automatic -ErrorAction SilentlyContinue
            Start-Service -Name msiserver -ErrorAction SilentlyContinue
            Write-Debug "msiserver service status: $((Get-Service msiserver).Status)"

            # --- Attempt 1: Run installer with policy fix ---
            $msiLog = Join-Path $env:RUNNER_TEMP "vc2003_install.log"
            Write-Host "Attempt 1: Running installer (policy relaxed, /qn)..."
            $proc = Start-Process -FilePath $installer `
              -ArgumentList "/s /v`"/qn AGREETOLICENSE=Yes /l*v \`"$msiLog\`"`"" `
              -Wait -PassThru
            Write-Host "Installer bootstrap exit code: $($proc.ExitCode)"

            # Wait for child msiexec to finish (max 3 min).
            $waited = 0
            $maxWait = 180
            do {
              Start-Sleep -Seconds 10
              $waited += 10
              # Filter to msiexec processes with a window title or command line
              # related to our install — the msiserver service is always running.
              $msiProcs = Get-Process msiexec -ErrorAction SilentlyContinue |
                Where-Object { $_.Id -ne (Get-WmiObject Win32_Service -Filter "Name='msiserver'" -ErrorAction SilentlyContinue).ProcessId }
              if ($msiProcs) {
                Write-Debug "msiexec child process(es) still running... ($waited s elapsed)"
              } else {
                break
              }
            } while ($waited -lt $maxWait)

            if ($waited -ge $maxWait) {
              Write-Host "::warning::msiexec timed out after ${maxWait}s. Killing child msiexec processes."
              $svcPid = (Get-WmiObject Win32_Service -Filter "Name='msiserver'" -ErrorAction SilentlyContinue).ProcessId
              Get-Process msiexec -ErrorAction SilentlyContinue |
                Where-Object { $_.Id -ne $svcPid } |
                Stop-Process -Force -ErrorAction SilentlyContinue
              Start-Sleep -Seconds 5
            }

            # Grace period.
            if (-not (Test-Path $clPath)) { Start-Sleep -Seconds 10 }

            # --- Attempt 2: Extract MSI from temp and run msiexec /a ---
            if (-not (Test-Path $clPath)) {
              Write-Host "Attempt 1 did not produce cl.exe."

              # Dump MSI log from attempt 1.
              if (Test-Path $msiLog) {
                Write-Host "MSI verbose log (last 100 lines):"
                Get-Content $msiLog -Tail 100 | ForEach-Object { Write-Host "  $_" }
              } else {
                Write-Host "No MSI log at $msiLog — the bootstrapper may not have reached msiexec."
                # Look for any MSI logs in TEMP.
                $msiLogs = Get-ChildItem $env:TEMP -Filter "MSI*.LOG" -ErrorAction SilentlyContinue |
                  Sort-Object LastWriteTime -Descending | Select-Object -First 3
                foreach ($log in $msiLogs) {
                  Write-Host "MSI log ($($log.Name), last 60 lines):"
                  Get-Content $log.FullName -Tail 60 | ForEach-Object { Write-Host "  $_" }
                }
              }

              # The bootstrapper may have extracted the MSI to a temp location
              # before failing. Search for it.
              Write-Host "Searching for extracted MSI files..."
              $msiFile = $null
              foreach ($root in @($env:TEMP, $env:RUNNER_TEMP, "C:\Windows\Temp", "C:\Users")) {
                $found = Get-ChildItem $root -Filter "*.msi" -Recurse -Depth 4 -ErrorAction SilentlyContinue |
                  Where-Object { $_.Length -gt 1MB } |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 1
                if ($found) {
                  $msiFile = $found
                  Write-Host "Found MSI: $($found.FullName) ($($found.Length) bytes, modified $($found.LastWriteTime))"
                  break
                }
              }

              if ($msiFile) {
                Write-Host "Attempt 2: Running msiexec /a (administrative extract)..."
                $extractDir = Join-Path $env:RUNNER_TEMP "vc2003_extract"
                $msiLog2 = Join-Path $env:RUNNER_TEMP "vc2003_admin_install.log"
                $msiProc = Start-Process msiexec `
                  -ArgumentList "/a `"$($msiFile.FullName)`" /qn TARGETDIR=`"$extractDir`" /l*v `"$msiLog2`"" `
                  -Wait -PassThru
                Write-Host "msiexec /a exit code: $($msiProc.ExitCode)"

                if (Test-Path $msiLog2) {
                  Write-Debug "Admin install log (last 40 lines):"
                  Get-Content $msiLog2 -Tail 40 | ForEach-Object { Write-Debug "  $_" }
                }

                $extractedCl = Get-ChildItem $extractDir -Filter "cl.exe" -Recurse -ErrorAction SilentlyContinue |
                  Select-Object -First 1
                if ($extractedCl) {
                  Write-Host "Found cl.exe at: $($extractedCl.FullName)"
                  $binDir = $extractedCl.Directory
                  $toolkitRoot = $binDir.Parent
                  if ((Test-Path "$($toolkitRoot.FullName)\bin") -and (Test-Path "$($toolkitRoot.FullName)\include")) {
                    Write-Host "Copying toolkit from $($toolkitRoot.FullName) to $vcRoot"
                    Copy-Item $toolkitRoot.FullName $vcRoot -Recurse -Force
                  } else {
                    Write-Host "Copying full extraction to $vcRoot"
                    New-Item -Path $vcRoot -ItemType Directory -Force | Out-Null
                    Copy-Item "$extractDir\*" $vcRoot -Recurse -Force
                  }
                } else {
                  Write-Host "cl.exe not found in msiexec /a extraction."
                  if (Test-Path $extractDir) {
                    Write-Host "Extract contents:"
                    Get-ChildItem $extractDir -Recurse -Name | Select-Object -First 50 |
                      ForEach-Object { Write-Host "  $_" }
                  }
                }
              } else {
                Write-Host "No MSI files found in temp directories."
                # List recent large files in TEMP for clues.
                Write-Host "Recent large files in TEMP:"
                Get-ChildItem $env:TEMP -Recurse -Depth 3 -ErrorAction SilentlyContinue |
                  Where-Object { $_.Length -gt 500KB } |
                  Sort-Object LastWriteTime -Descending |
                  Select-Object -First 20 |
                  ForEach-Object { Write-Host "  $($_.Length.ToString().PadLeft(12))  $($_.LastWriteTime)  $($_.FullName)" }
              }
            }
          }

          if (-not (Test-Path $clPath)) {
            Write-Host "::error::cl.exe not found after all installation attempts."
            if (Test-Path $vcRoot) {
              Write-Host "Install directory contents:"
              Get-ChildItem $vcRoot -Recurse -Name | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "Install directory does NOT exist: $vcRoot"
            }
            throw "VC++ Toolkit 2003 was not provisioned correctly. Expected compiler at: $clPath"
          }

          Write-Host "VC++ Toolkit 2003 compiler found at: $clPath"

          $libDir = Join-Path $vcRoot "lib"
          New-Item -Path $libDir -ItemType Directory -Force | Out-Null

          foreach ($lib in @("msvcrt.lib", "msvcrtd.lib", "msvcprt.lib")) {
            $target = Join-Path $libDir $lib
            if (-not (Test-Path $target)) {
              Invoke-WebRequest "$env:BUILD_DEPS_URL/$lib" -OutFile $target -UseBasicParsing
            }
          }

      - name: Fetch missing Boost 1.32 and Python24 folders
        if: steps.cache-sdk-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $tmpRepo = Join-Path $env:RUNNER_TEMP "civ4-sdk-deps"
          if (Test-Path $tmpRepo) {
            Remove-Item -Recurse -Force $tmpRepo
          }

          git clone --depth 1 --branch master "https://github.com/$env:SDK_DEPS_REPO.git" $tmpRepo

          Copy-Item "$tmpRepo\Boost-1.32.0" "CvGameCoreDLL\Boost-1.32.0" -Recurse -Force
          Copy-Item "$tmpRepo\Python24" "CvGameCoreDLL\Python24" -Recurse -Force

      - name: Validate dependency folders
        shell: pwsh
        run: |
          $requiredPaths = @(
            "CvGameCoreDLL\Boost-1.32.0\include\boost\python.hpp",
            "CvGameCoreDLL\Boost-1.32.0\libs\boost_python-vc71-mt-1_32.lib",
            "CvGameCoreDLL\Python24\include\Python.h",
            "CvGameCoreDLL\Python24\libs\python24.lib"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              throw "Missing required SDK dependency: $path"
            }
          }

      - name: Resolve a compatible Windows SDK path
        shell: pwsh
        run: |
          function Test-PsdkRoot([string]$root) {
            if ([string]::IsNullOrWhiteSpace($root)) {
              return $false
            }

            $rc = Join-Path $root "Bin\rc.exe"
            $include = Join-Path $root "Include\windows.h"
            $lib = Join-Path $root "Lib\kernel32.lib"

            return (Test-Path $rc) -and (Test-Path $include) -and (Test-Path $lib)
          }

          $candidates = @(
            "C:\Program Files\Microsoft SDKs\Windows\v7.1",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.1",
            "C:\Program Files\Microsoft SDKs\Windows\v7.0A",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.0A"
          )

          $psdkPath = $null
          foreach ($candidate in $candidates) {
            if (Test-PsdkRoot $candidate) {
              $psdkPath = $candidate
              break
            }
          }

          if (-not $psdkPath) {
            throw "No compatible Windows SDK was found. Expected one of: $($candidates -join ', ')"
          }

          "TOOLKIT_PATH=$env:VC2003_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PSDK_PATH=$psdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Using toolkit: $env:VC2003_ROOT"
          Write-Host "Using Windows SDK: $psdkPath"

      - name: Build Release DLL
        working-directory: CvGameCoreDLL
        shell: cmd
        run: |
          nmake TOOLKIT="%TOOLKIT_PATH%" PSDK="%PSDK_PATH%" Release

      - name: Stage built DLL into Assets
        shell: pwsh
        run: |
          Copy-Item "CvGameCoreDLL\Release\CvGameCoreDLL.dll" "Assets\CvGameCoreDLL.dll" -Force

      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CvGameCoreDLL-Release
          if-no-files-found: error
          path: |
            CvGameCoreDLL/Release/CvGameCoreDLL.dll
            CvGameCoreDLL/Release/CvGameCoreDLL.pdb
            Assets/CvGameCoreDLL.dll