name: Build Civ4 K-Mod DLL

on:
  workflow_dispatch:
  push:
    paths:
      - "CvGameCoreDLL/**"
      - ".github/workflows/build-civ4-dll.yml"
  pull_request:
    paths:
      - "CvGameCoreDLL/**"
      - ".github/workflows/build-civ4-dll.yml"

concurrency:
  group: build-civ4-dll-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-dll:
    runs-on: windows-2022
    timeout-minutes: 90
    env:
      VC2003_ROOT: C:\Program Files (x86)\Microsoft Visual C++ Toolkit 2003
      BUILD_DEPS_URL: https://github.com/magnublo/Civ4-K-Mod/releases/download/build-deps/v1
      SDK_DEPS_REPO: FinalFrontierPlus/CvGameCoreDLL
      SDK_DEPS_REF: fc130b5ebaf13f9b989004332a4bf0ddd50cd172

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up developer command prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache VC++ Toolkit 2003
        id: cache-vc2003
        uses: actions/cache@v4
        with:
          path: C:\Program Files (x86)\Microsoft Visual C++ Toolkit 2003
          key: ${{ runner.os }}-vc2003-toolkit-v1

      - name: Cache Civ4 SDK dependency folders
        id: cache-sdk-deps
        uses: actions/cache@v4
        with:
          path: |
            CvGameCoreDLL/Boost-1.32.0
            CvGameCoreDLL/Python24
          key: ${{ runner.os }}-civ4-sdk-deps-${{ env.SDK_DEPS_REF }}

      - name: Install VC++ Toolkit 2003 and required CRT libs
        env:
          # Set to 'true' for verbose diagnostic output from this step.
          VC2003_DEBUG: 'true'
        shell: pwsh
        run: |
          $vcRoot = $env:VC2003_ROOT
          $clPath = Join-Path $vcRoot "bin\cl.exe"
          $debug  = $env:VC2003_DEBUG -eq 'true'

          function Write-Debug($msg) { if ($debug) { Write-Host "[DEBUG] $msg" } }

          if (-not (Test-Path $clPath)) {
            Write-Host "Installing VC++ Toolkit 2003 via 7-Zip extraction..."
            $installer = Join-Path $env:RUNNER_TEMP "VCToolkitSetup.exe"
            Invoke-WebRequest "$env:BUILD_DEPS_URL/VCToolkitSetup.exe" -OutFile $installer -UseBasicParsing

            $fileSize = (Get-Item $installer).Length
            Write-Host "Downloaded installer size: $fileSize bytes"
            if ($fileSize -lt 1MB) {
              throw "Downloaded installer is too small ($fileSize bytes). The host may be returning an error page instead of the binary."
            }

            # --- Phase 1: Extract the InstallShield bootstrapper ---
            $stage1 = Join-Path $env:RUNNER_TEMP "vc2003_stage1"
            Write-Host "Phase 1: Extracting InstallShield bootstrapper..."
            & 7z x $installer "-o$stage1" -y | Out-Null
            Write-Debug "7z exit code (phase 1): $LASTEXITCODE"

            if ($debug -and (Test-Path $stage1)) {
              Write-Debug "Stage 1 contents:"
              Get-ChildItem $stage1 -Recurse | ForEach-Object {
                Write-Debug "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
              }
            }

            # Find the MSI — it may be directly in stage1, or embedded inside the
            # InstallShield payload blob (typically named '[0]' by 7z).
            $msiFile = Get-ChildItem $stage1 -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue |
              Sort-Object Length -Descending | Select-Object -First 1

            if (-not $msiFile) {
              # The installer's embedded payload is extracted as '[0]' or a large
              # unnamed blob. Try extracting every large file (>1MB) with 7z to
              # find the MSI inside.
              $blobs = Get-ChildItem $stage1 -Recurse -ErrorAction SilentlyContinue |
                Where-Object { -not $_.PSIsContainer -and $_.Length -gt 1MB }
              foreach ($blob in $blobs) {
                Write-Host "Extracting nested payload: $($blob.Name) ($($blob.Length) bytes)..."
                $blobExtract = Join-Path $env:RUNNER_TEMP "vc2003_blob_$($blob.Name)"
                & 7z x $blob.FullName "-o$blobExtract" -y 2>&1 | Out-Null
                Write-Debug "7z exit code (blob $($blob.Name)): $LASTEXITCODE"

                if (Test-Path $blobExtract) {
                  if ($debug) {
                    Write-Debug "Blob '$($blob.Name)' contents:"
                    Get-ChildItem $blobExtract -Recurse | ForEach-Object {
                      Write-Debug "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
                    }
                  }

                  $msiFile = Get-ChildItem $blobExtract -Filter "*.msi" -Recurse -ErrorAction SilentlyContinue |
                    Sort-Object Length -Descending | Select-Object -First 1
                  if ($msiFile) { break }

                  # Maybe the blob itself IS the MSI (just not named .msi).
                  # Check if it extracted files that look like toolkit content.
                  $directCl = Get-ChildItem $blobExtract -Filter "cl.exe" -Recurse -ErrorAction SilentlyContinue |
                    Select-Object -First 1
                  if ($directCl) {
                    Write-Host "Found cl.exe directly inside blob '$($blob.Name)' — skipping MSI search."
                    # Use blobExtract as stage2 directly.
                    $stage2Override = $blobExtract
                    break
                  }
                }
              }
            }

            if (-not $msiFile -and -not $stage2Override) {
              Write-Host "::error::Could not find an MSI inside the installer."
              if (Test-Path $stage1) {
                Write-Host "Full stage 1 listing:"
                Get-ChildItem $stage1 -Recurse | ForEach-Object {
                  Write-Host "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
                }
              }
              throw "Failed to extract MSI from VCToolkitSetup.exe"
            }

            # --- Phase 2: Extract file contents from the MSI ---
            $stage2 = if ($stage2Override) { $stage2Override } else {
              $s2 = Join-Path $env:RUNNER_TEMP "vc2003_stage2"
              Write-Host "Found MSI: $($msiFile.FullName) ($($msiFile.Length) bytes)"
              Write-Host "Phase 2: Extracting MSI contents..."
              & 7z x $msiFile.FullName "-o$s2" -y | Out-Null
              Write-Debug "7z exit code (phase 2): $LASTEXITCODE"
              $s2
            }

            if ($debug -and (Test-Path $stage2)) {
              Write-Debug "Stage 2 contents:"
              Get-ChildItem $stage2 -Recurse | ForEach-Object {
                Write-Debug "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
              }
            }

            # --- Phase 3: Locate cl.exe and reconstruct the toolkit directory ---
            $extractedCl = Get-ChildItem $stage2 -Filter "cl.exe" -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 1

            if ($extractedCl) {
              # Walk up from cl.exe to find the toolkit root.
              # Expected structure: .../Microsoft Visual C++ Toolkit 2003/bin/cl.exe
              $binDir = $extractedCl.Directory
              $toolkitRoot = $binDir.Parent

              # Verify this looks like the toolkit root (should have bin/ and include/).
              $hasBin = Test-Path (Join-Path $toolkitRoot.FullName "bin")
              $hasInclude = Test-Path (Join-Path $toolkitRoot.FullName "include")

              if ($hasBin -and $hasInclude) {
                Write-Host "Phase 3: Copying toolkit from $($toolkitRoot.FullName) to $vcRoot"
                Copy-Item $toolkitRoot.FullName $vcRoot -Recurse -Force
              } else {
                # Fallback: just copy the entire extraction to vcRoot and hope for the best.
                Write-Host "Phase 3: Toolkit structure not as expected. Copying full extraction."
                Write-Debug "binDir: $($binDir.FullName), parent: $($toolkitRoot.FullName)"
                Write-Debug "hasBin=$hasBin, hasInclude=$hasInclude"
                New-Item -Path $vcRoot -ItemType Directory -Force | Out-Null
                Copy-Item "$stage2\*" $vcRoot -Recurse -Force
              }
            } else {
              # cl.exe wasn't found with its normal name — MSI extraction sometimes
              # produces files without extensions or with mangled names.
              Write-Host "::error::cl.exe not found in extracted MSI."
              Write-Host "Full stage 2 listing:"
              Get-ChildItem $stage2 -Recurse | ForEach-Object {
                Write-Host "  $($_.Length.ToString().PadLeft(12))  $($_.FullName)"
              }
              throw "cl.exe not found after extracting MSI contents"
            }
          }

          if (-not (Test-Path $clPath)) {
            Write-Host "::error::cl.exe not found at expected path after extraction."
            if (Test-Path $vcRoot) {
              Write-Host "Install directory contents:"
              Get-ChildItem $vcRoot -Recurse -Name | ForEach-Object { Write-Host "  $_" }
            } else {
              Write-Host "Install directory does NOT exist: $vcRoot"
            }
            throw "VC++ Toolkit 2003 was not provisioned correctly. Expected compiler at: $clPath"
          }

          Write-Host "VC++ Toolkit 2003 compiler found at: $clPath"

          $libDir = Join-Path $vcRoot "lib"
          New-Item -Path $libDir -ItemType Directory -Force | Out-Null

          foreach ($lib in @("msvcrt.lib", "msvcrtd.lib", "msvcprt.lib")) {
            $target = Join-Path $libDir $lib
            if (-not (Test-Path $target)) {
              Invoke-WebRequest "$env:BUILD_DEPS_URL/$lib" -OutFile $target -UseBasicParsing
            }
          }

      - name: Fetch missing Boost 1.32 and Python24 folders
        if: steps.cache-sdk-deps.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $tmpRepo = Join-Path $env:RUNNER_TEMP "civ4-sdk-deps"
          if (Test-Path $tmpRepo) {
            Remove-Item -Recurse -Force $tmpRepo
          }

          git clone --depth 1 --branch master "https://github.com/$env:SDK_DEPS_REPO.git" $tmpRepo

          Copy-Item "$tmpRepo\Boost-1.32.0" "CvGameCoreDLL\Boost-1.32.0" -Recurse -Force
          Copy-Item "$tmpRepo\Python24" "CvGameCoreDLL\Python24" -Recurse -Force

      - name: Validate dependency folders
        shell: pwsh
        run: |
          $requiredPaths = @(
            "CvGameCoreDLL\Boost-1.32.0\include\boost\python.hpp",
            "CvGameCoreDLL\Boost-1.32.0\libs\boost_python-vc71-mt-1_32.lib",
            "CvGameCoreDLL\Python24\include\Python.h",
            "CvGameCoreDLL\Python24\libs\python24.lib"
          )

          foreach ($path in $requiredPaths) {
            if (-not (Test-Path $path)) {
              throw "Missing required SDK dependency: $path"
            }
          }

      - name: Resolve a compatible Windows SDK path
        shell: pwsh
        run: |
          function Test-PsdkRoot([string]$root) {
            if ([string]::IsNullOrWhiteSpace($root)) {
              return $false
            }

            $rc = Join-Path $root "Bin\rc.exe"
            $include = Join-Path $root "Include\windows.h"
            $lib = Join-Path $root "Lib\kernel32.lib"

            return (Test-Path $rc) -and (Test-Path $include) -and (Test-Path $lib)
          }

          $candidates = @(
            "C:\Program Files\Microsoft SDKs\Windows\v7.1",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.1",
            "C:\Program Files\Microsoft SDKs\Windows\v7.0A",
            "C:\Program Files (x86)\Microsoft SDKs\Windows\v7.0A"
          )

          $psdkPath = $null
          foreach ($candidate in $candidates) {
            if (Test-PsdkRoot $candidate) {
              $psdkPath = $candidate
              break
            }
          }

          if (-not $psdkPath) {
            throw "No compatible Windows SDK was found. Expected one of: $($candidates -join ', ')"
          }

          "TOOLKIT_PATH=$env:VC2003_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "PSDK_PATH=$psdkPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Using toolkit: $env:VC2003_ROOT"
          Write-Host "Using Windows SDK: $psdkPath"

      - name: Build Release DLL
        working-directory: CvGameCoreDLL
        shell: cmd
        run: |
          nmake TOOLKIT="%TOOLKIT_PATH%" PSDK="%PSDK_PATH%" Release

      - name: Stage built DLL into Assets
        shell: pwsh
        run: |
          Copy-Item "CvGameCoreDLL\Release\CvGameCoreDLL.dll" "Assets\CvGameCoreDLL.dll" -Force

      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: CvGameCoreDLL-Release
          if-no-files-found: error
          path: |
            CvGameCoreDLL/Release/CvGameCoreDLL.dll
            CvGameCoreDLL/Release/CvGameCoreDLL.pdb
            Assets/CvGameCoreDLL.dll